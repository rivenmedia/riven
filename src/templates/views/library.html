<section class="view view-library" data-view="library">
  <header class="view-header">
    <div>
      <h1 data-slot="title">Library</h1>
      <p data-slot="subtitle">Manage your local media queue, statuses, and backend actions.</p>
    </div>
  </header>

  <form class="toolbar toolbar--library" data-slot="filters">
    <input type="search" data-slot="search" placeholder="Search title or imdb/tmdb/tvdb id">
    <select data-slot="state"></select>
    <select data-slot="sort">
      <option value="date_desc">Newest requested</option>
      <option value="date_asc">Oldest requested</option>
      <option value="title_asc">Title A-Z</option>
      <option value="title_desc">Title Z-A</option>
    </select>
    <select data-slot="limit">
      <option value="24">24 / page</option>
      <option value="48">48 / page</option>
      <option value="96">96 / page</option>
    </select>
    <button type="submit" class="btn btn--primary">Apply</button>
  </form>

  <div class="media-grid" data-slot="grid"></div>
  <p class="empty-state" data-slot="empty" hidden>No items matched the current filters.</p>
  <div class="pagination-bar" data-slot="pagination"></div>
</section>
