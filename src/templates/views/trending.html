<section class="view view-trending" data-view="trending">
  <header class="view-header">
    <div>
      <h1>Trending</h1>
      <p>Monitor what is hot on TMDB and push content into your library.</p>
    </div>
  </header>

  <form class="toolbar toolbar--trending" data-slot="controls">
    <div data-slot="media-type-toggle"></div>
    <select data-slot="window">
      <option value="day">Today</option>
      <option value="week">This Week</option>
    </select>
    <button type="submit" class="btn btn--primary">Refresh</button>
  </form>

  <div class="media-grid" data-slot="grid"></div>
  <p class="empty-state" data-slot="empty" hidden>No trending entries were returned.</p>
</section>
