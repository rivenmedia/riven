<section class="view view-settings" data-view="settings">
  <header class="view-header">
    <div>
      <h1>Settings</h1>
      <p>Edit settings by logical groups and persist directly through API.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn--secondary" data-action="reload-from-disk">Reload</button>
      <button class="btn btn--primary" data-action="save-to-disk">Save File</button>
    </div>
  </header>

  <div class="toolbar toolbar--settings">
    <input type="search" data-slot="filter" placeholder="Filter groups (e.g. filesystem, ranking)">
  </div>

  <div class="settings-groups" data-slot="groups"></div>
</section>
