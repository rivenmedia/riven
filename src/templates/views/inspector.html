<section class="view view-inspector" data-view="inspector">
  <header class="view-header">
    <div>
      <h1>Inspector</h1>
      <p>Inspect backend internals, logs, and arbitrary API endpoint responses.</p>
    </div>
  </header>

  <div class="split-grid">
    <section class="panel">
      <div class="section-head">
        <h2>Quick Endpoints</h2>
      </div>
      <div class="quick-endpoints" data-slot="quick-endpoints"></div>
      <pre class="json-output" data-slot="quick-output"></pre>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Endpoint Runner</h2>
      </div>
      <form class="endpoint-form" data-slot="endpoint-form">
        <select data-slot="method">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="DELETE">DELETE</option>
        </select>
        <input type="text" data-slot="path" placeholder="/stats">
        <textarea data-slot="body" placeholder='{"example":"payload"}'></textarea>
        <button type="submit" class="btn btn--primary">Run</button>
      </form>
      <pre class="json-output" data-slot="runner-output"></pre>
    </section>
  </div>

  <section class="panel">
    <div class="section-head">
      <h2>Logs (Virtualized)</h2>
      <div class="toolbar">
        <button type="button" class="btn btn--secondary btn--small" data-action="refresh-logs">Refresh</button>
      </div>
    </div>
    <div class="log-toolbar">
      <input type="search" data-slot="log-search" placeholder="Filter logs">
    </div>
    <div class="log-meta" data-slot="log-meta"></div>
    <div data-slot="log-container"></div>
  </section>
</section>
