<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riven Control Center</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/views.css">
  <script type="module" src="/static/js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</head>
<body>
  <div id="app" x-data="appState()">
    <div id="view-login" x-show="!hasKey" x-cloak>
      {% include 'views/login.html' %}
    </div>

    <div id="view-app" class="app-shell" x-show="hasKey" x-cloak style="display: none;">
      {% include 'components/nav.html' %}
      <main class="app-main">
        <div class="view-host" id="view-container"></div>
      </main>
    </div>
  </div>

  <template id="view-library">{% include 'views/library.html' %}</template>
  <template id="view-movies">{% include 'views/library.html' %}</template>
  <template id="view-shows">{% include 'views/library.html' %}</template>
  <template id="view-explore">{% include 'views/explore.html' %}</template>
  <template id="view-trending">{% include 'views/trending.html' %}</template>
  <template id="view-dashboard">{% include 'views/dashboard.html' %}</template>
  <template id="view-inspector">{% include 'views/inspector.html' %}</template>
  <template id="view-settings">{% include 'views/settings.html' %}</template>
  <template id="view-vfs-stats">{% include 'views/vfs_stats.html' %}</template>
  <template id="view-item-detail">{% include 'views/item_detail.html' %}</template>
  <template id="view-calendar">{% include 'views/calendar.html' %}</template>
  <template id="view-mount">{% include 'views/mount.html' %}</template>

  {% include 'components/manual_scrape_modal.html' %}
  <div id="toast-root" class="toast-root" aria-live="polite"></div>
</body>
</html>
